# ============================================================
# AI Agent 模型配置
# 切换模型只需改 active 字段，其他什么都不用动
# 可选值: qwen | deepseek | openai
# ============================================================
active: "qwen"

providers:
  # ---------- 阿里云 千问 ----------
  qwen:
    chat:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "qwen3.5-plus"
      api_key_env: "DASHSCOPE_API_KEY"
    embedding:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "text-embedding-v4"
      api_key_env: "DASHSCOPE_API_KEY"
    pricing:
      input: 0.2    # 元/百万tokens
      output: 2.0

  # ---------- DeepSeek ----------
  deepseek:
    chat:
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
      api_key_env: "DEEPSEEK_API_KEY"
    embedding:
      # DeepSeek 无 embedding API，回退用千问
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "text-embedding-v4"
      api_key_env: "DASHSCOPE_API_KEY"
    pricing:
      input: 1.0
      output: 2.0

  # ---------- OpenAI ----------
  openai:
    chat:
      base_url: "https://api.openai.com/v1"
      model: "gpt-4o"
      api_key_env: "OPENAI_API_KEY"
    embedding:
      base_url: "https://api.openai.com/v1"
      model: "text-embedding-3-small"
      api_key_env: "OPENAI_API_KEY"
    pricing:
      input: 2.5
      output: 10.0
